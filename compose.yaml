services:
  postgres:
    image: postgres:17-alpine
    container_name: liza-alert-postgres
    environment:
      POSTGRES_DB: liza_alert
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - liza-alert-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d liza_alert"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  liza-alert-postgres-data:
