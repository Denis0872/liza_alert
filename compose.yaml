services:
  postgres:
    image: postgres:17-alpine
    container_name: landing-demo-postgres
    environment:
      POSTGRES_DB: landingdemo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d landingdemo"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
